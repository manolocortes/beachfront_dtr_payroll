name: Build JavaFX Installers

on:
  push:
    branches: [ "main" ] # Runs automatically when you push to main
  workflow_dispatch: # Adds a "Run workflow" button in GitHub so you can trigger it manually

jobs:
  build:
    strategy:
      matrix: # This tells GitHub to run this job 3 times on 3 different OS's
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven # Speeds up future builds

      - name: Build Fat JAR with Maven
        run: mvn clean package

      # --- WINDOWS BUILD ---
      # GitHub's Windows servers already have the WiX Toolset pre-installed!
      - name: Package Windows Installer
        if: matrix.os == 'windows-latest'
        run: >
          jpackage --type exe --name "Payroll"
          --input target/ --main-jar payroll-app-1.0-SNAPSHOT.jar
          --main-class com.payroll.Launcher --dest release/
          --win-shortcut --win-menu

      # --- MACOS BUILD ---
      - name: Package macOS Installer
        if: matrix.os == 'macos-latest'
        run: >
          jpackage --type dmg --name "Payroll"
          --input target/ --main-jar payroll-app-1.0-SNAPSHOT.jar
          --main-class com.payroll.Launcher --dest release/

      # --- LINUX BUILD ---
      - name: Package Linux Installer
        if: matrix.os == 'ubuntu-latest'
        run: >
          jpackage --type deb --name "Payroll"
          --input target/ --main-jar payroll-app-1.0-SNAPSHOT.jar
          --main-class com.payroll.Launcher --dest release/

      - name: Upload Installers as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Payroll-Installer-${{ matrix.os }}
          path: release/